server {
    listen 80;
    server_name localhost;

    root /var/www/frontend;
    index index.html;

    # ─── Gzip ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ─── Frontend static assets ─────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ─── Backend API ────────────────────────────────
    location /api {
        include fastcgi_params;
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 300;

        # Upload limit
        client_max_body_size 20M;
    }

    # ─── Backend storage (uploads/bukti) ────────────
    location /storage {
        alias /var/www/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ─── Backend public assets ──────────────────────
    location /uploads {
        alias /var/www/backend/public/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ─── Laravel routes via PHP-FPM ─────────────────
    location ~ ^/(login|register|logout|forgot-password|sanctum|auth) {
        include fastcgi_params;
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 300;
    }

    # ─── SPA fallback (frontend routing) ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Block hidden files ─────────────────────────
    location ~ /\. {
        deny all;
    }

    # ─── Security headers ───────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
